<li class="party-row">
  <input
    class="party-row__color"
    [style.backgroundColor]="party().color"
    type="checkbox"
    aria-label="Select Partido Rojo"
  />

  <input
    (input)="updatedPartyName($event.target.value)"
    class="party-row__name"
    type="text"
    [value]="party().name"
    aria-label="Party name"
  />

  <div class="party-row__controls" aria-label="Party value controls">
    <button
      (click)="decrementeVotes.emit(party())"
      class="party-row__control-button"
      type="button"
      aria-label="Decrease value"
    >
      <span aria-hidden="true">−</span>
    </button>

    <span class="party-row__value" aria-label="Current value">{{ party().votes }}</span>

    <button
      (click)="incrementeVotes.emit(party())"
      class="party-row__control-button"
      type="button"
      aria-label="Increase value"
    >
      <span aria-hidden="true">+</span>
    </button>

    <button
      (click)="delete.emit(party())"
      class="party-row__delete-button"
      type="button"
      aria-label="Delete party"
    >
      <span aria-hidden="true">×</span>
    </button>
  </div>
</li>
